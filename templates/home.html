<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODO LIST - Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    font-family: Arial, Helvetica, sans-serif;
}

.main-box{
    background: rgba(204, 96, 172, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    margin-top: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

.section-title{
    font-weight:700;
    margin-bottom:15px;
}

.task-scroll{
    max-height:430px;
    overflow-y:auto;
    padding-right:8px;
}

.task-card{
    background:rgb(214, 208, 212);
    color:#090a0a;
    border:none;
    border-radius:14px;
    margin-bottom:12px;
    box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.completed-card{
    background:#dcfce7;
    color:#14532d;
    border:none;
    border-radius:14px;
    margin-bottom:12px;
}

.btn-icon{
    width:38px;
    height:38px;
    border-radius:10px;
    border:none;
}

.add-form{
    margin-top:25px;
}

.form-control{
    height:55px;
    border-radius:12px;
}

.add-btn{
    width:160px;
    border-radius:12px;
    font-weight:600;
}

small{
    color:#cbd5e1;
}
</style>
</head>

<body>

<div class="container">
<div class="main-box">

<h2 class="text-center mb-2">✨ My ToDo Dashboard ✨</h2>
<p class="text-center mb-4"><small>Stay organized. Stay sharp.</small></p>

<div class="row g-4">

<!-- Pending Tasks -->
<div class="col-md-7">
<h4 class="section-title">📌 Pending Tasks</h4>

<div class="task-scroll">

{% for task in tasks %}
<div class="card task-card">
<div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">

<span>{{ task.task }}</span>

<div class="d-flex gap-2">
<a class="btn btn-success btn-icon"><i class="fa fa-check"></i></a>
<a class="btn btn-danger btn-icon"><i class="fa fa-trash"></i></a>
<a class="btn btn-primary btn-icon"><i class="fa fa-pencil"></i></a>
</div>

</div>
</div>
{% empty %}
<div class="alert alert-light">No pending tasks.</div>
{% endfor %}

</div>
</div>

<!-- Completed Tasks -->
<div class="col-md-5">
<h4 class="section-title">✅ Completed Tasks</h4>

<div class="task-scroll">

{% for task in completed_tasks %}
<div class="card completed-card">
<div class="card-body">
{{ task.task }}
</div>
</div>
{% empty %}
<div class="alert alert-light">No completed tasks.</div>
{% endfor %}

</div>
</div>

</div>

<!-- Add Task Form -->
<div class="add-form">
<form action="{% url 'addTask' %}" method="post">
{% csrf_token %}

<div class="row g-2">
<div class="col-md-9">
<input type="text" name="task" class="form-control" placeholder="Enter new task...">
</div>

<div class="col-md-3">
<button type="submit" class="btn btn-warning w-100 h-100 add-btn">
<i class="fa fa-plus"></i> Add Task
</button>
</div>
</div>

</form>
</div>

</div>
</div>

</body>
</html>
